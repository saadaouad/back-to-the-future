name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Build & Test pipeline
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bttf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d bttf_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_STAGE: test
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bttf_test
      VITE_API_URL: http://localhost:3001
      PORT: 3001
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format
        run: npx turbo run format --affected

      - name: Lint
        run: npx turbo run lint --affected

      - name: Unit tests
        run: npx turbo run test:unit --affected

      - name: Integration tests
        run: npx turbo run test:integration --affected

      - name: Build
        run: npx turbo run build --affected
